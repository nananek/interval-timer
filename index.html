<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14110f">
<title>インターバルタイマー</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="インターバルタイマー">
<style>
  :root{
    --ink:#14110f;
    --ink-soft:#1e1a17;
    --paper:#f3ede2;
    --muted:#8a8073;
    --line:#2c2722;
    --solve:#e0843f;   /* 解く: 焦点・緊張 */
    --review:#5b9279;  /* 解説: 落ち着き・内省 */
    --solve-dim:#3a2418;
    --review-dim:#1c2c24;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",system-ui,sans-serif;
    display:flex;flex-direction:column;
    min-height:100dvh;
    overflow:hidden;
    transition:background .6s ease;
  }
  body.phase-solve{background:linear-gradient(180deg,var(--solve-dim),var(--ink) 55%)}
  body.phase-review{background:linear-gradient(180deg,var(--review-dim),var(--ink) 55%)}

  /* --- top bar --- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:max(env(safe-area-inset-top),18px) 22px 8px;
    flex:0 0 auto;
  }
  .brand{
    font-size:13px;letter-spacing:.18em;color:var(--muted);
    text-transform:uppercase;font-weight:700;
  }
  .progress-pill{
    font-size:13px;color:var(--paper);
    font-variant-numeric:tabular-nums;
    border:1px solid var(--line);border-radius:999px;
    padding:5px 13px;letter-spacing:.04em;
  }

  /* --- main timer --- */
  main{
    flex:1 1 auto;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;
    padding:0 22px;
  }
  .phase-label{
    font-size:15px;letter-spacing:.32em;font-weight:700;
    text-transform:uppercase;
    transition:color .4s ease;
    height:22px;
  }
  .phase-solve .phase-label{color:var(--solve)}
  .phase-review .phase-label{color:var(--review)}

  .ring-wrap{position:relative;width:min(76vw,330px);aspect-ratio:1}
  svg{width:100%;height:100%;transform:rotate(-90deg);display:block}
  .track{stroke:var(--line);fill:none}
  .arc{fill:none;stroke-linecap:round;
    transition:stroke .4s ease;
    stroke:var(--muted);
  }
  .phase-solve .arc{stroke:var(--solve)}
  .phase-review .arc{stroke:var(--review)}

  .readout{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;
  }
  .qnow{font-size:15px;font-weight:700;letter-spacing:.06em;margin-bottom:4px;
    transition:color .4s ease}
  .phase-solve .qnow{color:var(--solve)}
  .phase-review .qnow{color:var(--review)}
  .qtotal{color:var(--muted);font-weight:600}
  .time{
    font-size:clamp(54px,17vw,82px);font-weight:300;
    font-variant-numeric:tabular-nums;letter-spacing:.01em;
    line-height:1;
  }
  .sub{font-size:13px;color:var(--muted);letter-spacing:.1em}

  /* progress dots: one per question, filled as you advance */
  .dots{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
    max-width:300px;margin-top:18px;min-height:9px}
  .dots i{width:9px;height:9px;border-radius:50%;background:var(--line);
    transition:background .3s ease,transform .3s ease}
  .dots i.done{background:var(--muted)}
  .dots i.current{transform:scale(1.35)}
  .phase-solve .dots i.current{background:var(--solve)}
  .phase-review .dots i.current{background:var(--review)}

  .config{margin-top:16px;font-size:13px;color:var(--muted);
    letter-spacing:.04em;font-variant-numeric:tabular-nums}

  /* --- controls --- */
  .controls{
    flex:0 0 auto;
    display:flex;gap:12px;align-items:center;justify-content:center;
    padding:14px 22px max(env(safe-area-inset-bottom),22px);
  }
  button{
    font-family:inherit;cursor:pointer;border:none;
    color:var(--paper);background:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:14px;
    font-size:16px;font-weight:600;letter-spacing:.04em;
    transition:transform .12s ease,background .2s ease,opacity .2s ease;
  }
  button:active{transform:scale(.96)}
  button:focus-visible{outline:2px solid var(--paper);outline-offset:2px}
  .btn-primary{
    flex:1;max-width:260px;padding:18px;
    font-size:18px;
    background:var(--paper);color:var(--ink);border-color:var(--paper);
  }
  .btn-ghost{padding:18px 20px;min-width:60px}

  /* --- twemoji icons (inline SVG via mask so they tint to text color where wanted) --- */
  .tw{display:inline-block;width:1.25em;height:1.25em;vertical-align:-0.2em;
    background-image:var(--svg);background-size:contain;background-repeat:no-repeat;
    background-position:center}
  .toggle .tw{width:1.1em;height:1.1em;margin-right:7px;vertical-align:-0.18em;
    opacity:.45;transition:opacity .2s ease}
  .toggle.on .tw{opacity:1}
  .btn-ghost .tw{width:1.4em;height:1.4em;vertical-align:-0.28em}
  .tw-gear{--svg:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2036%2036%22%3E%3Cpath%20fill%3D%22%2366757F%22%20d%3D%22M34%2015h-3.362c-.324-1.369-.864-2.651-1.582-3.814l2.379-2.379c.781-.781.781-2.048%200-2.829l-1.414-1.414c-.781-.781-2.047-.781-2.828%200l-2.379%202.379C23.65%206.225%2022.369%205.686%2021%205.362V2c0-1.104-.896-2-2-2h-2c-1.104%200-2%20.896-2%202v3.362c-1.369.324-2.651.864-3.814%201.582L8.808%204.565c-.781-.781-2.048-.781-2.828%200L4.565%205.979c-.781.781-.781%202.048-.001%202.829l2.379%202.379C6.225%2012.35%205.686%2013.632%205.362%2015H2c-1.104%200-2%20.896-2%202v2c0%201.104.896%202%202%202h3.362c.324%201.368.864%202.65%201.582%203.813l-2.379%202.379c-.78.78-.78%202.048.001%202.829l1.414%201.414c.78.78%202.047.78%202.828%200l2.379-2.379c1.163.719%202.445%201.258%203.814%201.582V34c0%201.104.896%202%202%202h2c1.104%200%202-.896%202-2v-3.362c1.368-.324%202.65-.864%203.813-1.582l2.379%202.379c.781.781%202.047.781%202.828%200l1.414-1.414c.781-.781.781-2.048%200-2.829l-2.379-2.379c.719-1.163%201.258-2.445%201.582-3.814H34c1.104%200%202-.896%202-2v-2C36%2015.896%2035.104%2015%2034%2015zM18%2026c-4.418%200-8-3.582-8-8s3.582-8%208-8%208%203.582%208%208-3.582%208-8%208z%22%2F%3E%3C%2Fsvg%3E")}
  .tw-skip{--svg:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2036%2036%22%3E%3Cpath%20fill%3D%22%233B88C3%22%20d%3D%22M36%2032c0%202.209-1.791%204-4%204H4c-2.209%200-4-1.791-4-4V4c0-2.209%201.791-4%204-4h28c2.209%200%204%201.791%204%204v28z%22%2F%3E%3Cpath%20fill%3D%22%23FFF%22%20d%3D%22M27%2018L15%207v9.166L5%207v22l10-9.167V29zm0-11h4v22h-4z%22%2F%3E%3C%2Fsvg%3E")}
  .tw-bell{--svg:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2036%2036%22%3E%3Cpath%20fill%3D%22%23FFAC33%22%20d%3D%22M28%2013c0%2011%205%2010%205%2015%200%200%200%202-2%202H5c-2%200-2-2-2-2%200-5%205-4%205-15C8%207.478%2012.477%203%2018%203s10%204.478%2010%2010z%22%2F%3E%3Ccircle%20fill%3D%22%23FFAC33%22%20cx%3D%2218%22%20cy%3D%223%22%20r%3D%223%22%2F%3E%3Cpath%20fill%3D%22%23FFAC33%22%20d%3D%22M18%2036c2.209%200%204-1.791%204-4h-8c0%202.209%201.791%204%204%204z%22%2F%3E%3C%2Fsvg%3E")}
  .tw-vib{--svg:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2036%2036%22%3E%3Cpath%20fill%3D%22%23F4900C%22%20d%3D%22M36%2032c0%204-4%204-4%204H4c-4%200-4-4-4-4V4c0-4%204-4%204-4h28s4%200%204%204v28z%22%2F%3E%3Cpath%20fill%3D%22%23FFF%22%20d%3D%22M24%203H12C9%203%209%206%209%206v24c0%203%203%203%203%203h12c3%200%203-3%203-3V6c0-3-3-3-3-3zm1%2025H11V8h14v20zM2%2015v5l5-2v-1zm1-2l4%202v-2l-4-3zm0%209l4-2v2l-4%203zm31-7v5l-5-2v-1zm-1-2l-4%202v-2l4-3zm0%209l-4-2v2l4%203z%22%2F%3E%3C%2Fsvg%3E")}

  /* --- settings sheet --- */
  .scrim{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:20;
  }
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:21;
    background:var(--ink-soft);
    border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;
    padding:8px 24px max(env(safe-area-inset-bottom),26px);
    transform:translateY(100%);transition:transform .34s cubic-bezier(.3,.8,.3,1);
    max-height:88dvh;overflow-y:auto;
  }
  .sheet.open{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:2px;background:var(--line);
    margin:10px auto 18px}
  .sheet h2{font-size:15px;letter-spacing:.16em;color:var(--muted);
    text-transform:uppercase;margin-bottom:18px;font-weight:700}
  .field{margin-bottom:22px}
  .field label{display:block;font-size:15px;margin-bottom:10px;font-weight:600}
  .field .hint{color:var(--muted);font-size:13px;font-weight:400;margin-left:6px}
  .stepper{display:flex;align-items:stretch;gap:10px}
  .stepper input{
    flex:1;background:var(--ink);color:var(--paper);
    border:1px solid var(--line);border-radius:12px;
    font-size:22px;font-family:inherit;text-align:center;
    font-variant-numeric:tabular-nums;padding:14px 8px;min-width:0;
  }
  .stepper button{width:56px;font-size:24px;font-weight:300}
  .toggles{display:flex;gap:10px}
  .toggle{
    flex:1;padding:14px 8px;border-radius:12px;text-align:center;
    background:var(--ink);border:1px solid var(--line);
    font-size:14px;font-weight:600;color:var(--muted);
  }
  .toggle.on{background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .sheet-done{
    width:100%;padding:18px;margin-top:4px;
    background:var(--paper);color:var(--ink);border-color:var(--paper);
    font-size:17px;
  }
  .install-row{display:none;margin-bottom:18px}
  .install-row.show{display:block}
  .install-row button{width:100%;padding:15px;font-size:15px}
</style>
</head>
<body class="phase-solve">

<header>
  <span class="brand">インターバルタイマー</span>
  <span class="progress-pill" id="progress">1 / 10</span>
</header>

<main>
  <div class="phase-label" id="phaseLabel">解く</div>
  <div class="ring-wrap">
    <svg viewBox="0 0 100 100">
      <circle class="track" cx="50" cy="50" r="45" stroke-width="3"></circle>
      <circle class="arc" id="arc" cx="50" cy="50" r="45" stroke-width="4"
        stroke-dasharray="282.74" stroke-dashoffset="0"></circle>
    </svg>
    <div class="readout">
      <div class="qnow" id="qnow">問題 1<span class="qtotal" id="qtotal"> / 10</span></div>
      <div class="time" id="time">02:00</div>
      <div class="sub" id="sub">解く</div>
    </div>
  </div>
  <div class="dots" id="dots" aria-hidden="true"></div>
  <div class="config" id="config">解く 2:00　・　解説 3:00　・　全 10 問</div>
</main>

<div class="controls">
  <button class="btn-ghost" id="settingsBtn" aria-label="設定"><i class="tw tw-gear"></i></button>
  <button class="btn-primary" id="startBtn">開始</button>
  <button class="btn-ghost" id="skipBtn" aria-label="次へ"><i class="tw tw-skip"></i></button>
</div>

<!-- settings -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="設定">
  <div class="grab"></div>
  <div class="install-row" id="installRow">
    <button id="installBtn">ホーム画面に追加</button>
  </div>
  <h2>設定</h2>

  <div class="field">
    <label>解く時間 <span class="hint">分:秒</span></label>
    <div class="stepper">
      <button data-act="dec" data-target="solve">−</button>
      <input type="text" id="solveInput" value="02:00" inputmode="numeric" readonly>
      <button data-act="inc" data-target="solve">+</button>
    </div>
  </div>

  <div class="field">
    <label>解説時間 <span class="hint">分:秒</span></label>
    <div class="stepper">
      <button data-act="dec" data-target="review">−</button>
      <input type="text" id="reviewInput" value="03:00" inputmode="numeric" readonly>
      <button data-act="inc" data-target="review">+</button>
    </div>
  </div>

  <div class="field">
    <label>問題数</label>
    <div class="stepper">
      <button data-act="dec" data-target="count">−</button>
      <input type="text" id="countInput" value="10" inputmode="numeric" readonly>
      <button data-act="inc" data-target="count">+</button>
    </div>
  </div>

  <div class="field">
    <label>切替の通知</label>
    <div class="toggles">
      <div class="toggle on" id="soundToggle"><i class="tw tw-bell"></i>音</div>
      <div class="toggle on" id="vibToggle"><i class="tw tw-vib"></i>バイブ</div>
    </div>
  </div>

  <button class="sheet-done" id="sheetDone">完了</button>
</div>

<script>
const $ = id => document.getElementById(id);
const C = 2 * Math.PI * 45; // 282.74

// ---- state ----
const cfg = {
  solve: 120,
  review: 180,
  count: 10,
  sound: true,
  vib: true,
};
let q = 1;                 // current question number
let phase = 'solve';       // 'solve' | 'review'
let remaining = cfg.solve;
let running = false;
let ticker = null;
let started = false;       // has the session begun at all

// ---- persistence ----
function save(){ try{ localStorage.setItem('tic-cfg', JSON.stringify(cfg)); }catch(e){} }
function load(){
  try{
    const s = JSON.parse(localStorage.getItem('tic-cfg'));
    if(s) Object.assign(cfg, s);
  }catch(e){}
}

// ---- audio (WebAudio beep, no asset needed) ----
let actx = null;
function beep(kind){
  if(!cfg.sound) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    const seq = kind==='review' ? [660,880] : [880,660]; // up for review, down for solve
    seq.forEach((f,i)=>{
      const o=actx.createOscillator(), g=actx.createGain();
      o.type='sine'; o.frequency.value=f;
      const t=actx.currentTime + i*0.18;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.3,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
      o.connect(g); g.connect(actx.destination);
      o.start(t); o.stop(t+0.18);
    });
  }catch(e){}
}
function buzz(){ if(cfg.vib && navigator.vibrate) navigator.vibrate([90,60,90]); }

// ---- render ----
function fmt(s){
  const m=Math.floor(s/60), ss=s%60;
  return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
}
function fmtLoose(s){ // 2:00 形式（先頭ゼロなし）
  const m=Math.floor(s/60), ss=s%60;
  return m+':'+String(ss).padStart(2,'0');
}
function buildDots(){
  const wrap=$('dots'); wrap.innerHTML='';
  for(let i=0;i<cfg.count;i++) wrap.appendChild(document.createElement('i'));
}
function render(){
  document.body.className = 'phase-'+phase;
  $('phaseLabel').textContent = phase==='solve' ? '解く' : '解説';
  $('time').textContent = fmt(Math.max(0,remaining));
  $('qnow').firstChild.textContent = `問題 ${q}`;
  $('qtotal').textContent = ` / ${cfg.count}`;
  $('sub').textContent = phase==='solve' ? '解く' : '解説を読む';
  $('progress').textContent = `${q} / ${cfg.count}`;
  $('config').textContent =
    `解く ${fmtLoose(cfg.solve)}　・　解説 ${fmtLoose(cfg.review)}　・　全 ${cfg.count} 問`;
  const total = phase==='solve' ? cfg.solve : cfg.review;
  const frac = total>0 ? Math.max(0,remaining)/total : 0;
  $('arc').style.strokeDashoffset = C * (1-frac);
  $('startBtn').textContent = !started ? '開始' : (running ? '一時停止' : '再開');
  // dots
  const dots=$('dots').children;
  for(let i=0;i<dots.length;i++){
    dots[i].className = (i < q-1) ? 'done' : (i === q-1 ? 'current' : '');
  }
}

// ---- engine ----
function tick(){
  remaining--;
  if(remaining < 0){ advance(); return; }
  render();
}
function advance(){
  // move to next phase or next question
  if(phase==='solve'){
    phase='review'; remaining=cfg.review;
    beep('review'); buzz();
  } else {
    if(q >= cfg.count){ finish(); return; }
    q++; phase='solve'; remaining=cfg.solve;
    beep('solve'); buzz();
  }
  render();
}
function start(){
  if(!started){ started=true; }
  running=true;
  clearInterval(ticker);
  ticker=setInterval(tick,1000);
  render();
}
function pause(){
  running=false; clearInterval(ticker); render();
}
function toggle(){
  // unlock audio on first user gesture
  try{ actx = actx || new (window.AudioContext||window.webkitAudioContext)(); actx.resume(); }catch(e){}
  running ? pause() : start();
}
function skip(){
  if(!started){ started=true; }
  remaining=0; advance();
  if(running){ clearInterval(ticker); ticker=setInterval(tick,1000); }
}
function finish(){
  running=false; clearInterval(ticker);
  beep('review'); buzz();
  q=1; phase='solve'; remaining=cfg.solve; started=false;
  render();
  $('sub').textContent = '完了！';
  setTimeout(()=>{ render(); }, 2200);
}
function resetSession(){
  running=false; started=false; clearInterval(ticker);
  q=1; phase='solve'; remaining=cfg.solve;
  render();
}

// ---- controls ----
$('startBtn').onclick = toggle;
$('skipBtn').onclick = skip;

// ---- settings sheet ----
function openSheet(){ $('scrim').classList.add('open'); $('sheet').classList.add('open'); }
function closeSheet(){ $('scrim').classList.remove('open'); $('sheet').classList.remove('open'); }
$('settingsBtn').onclick = openSheet;
$('scrim').onclick = closeSheet;
$('sheetDone').onclick = ()=>{ save(); closeSheet(); };

// steppers
const steps = { solve:5, review:5, count:1 };
const mins  = { solve:5, review:5, count:1 };
const maxs  = { solve:1800, review:1800, count:99 };
function refreshInputs(){
  $('solveInput').value = fmt(cfg.solve);
  $('reviewInput').value = fmt(cfg.review);
  $('countInput').value = cfg.count;
}
document.querySelectorAll('.stepper button').forEach(b=>{
  b.onclick = ()=>{
    const t=b.dataset.target, act=b.dataset.act;
    const d=(act==='inc'?1:-1)*steps[t];
    cfg[t]=Math.min(maxs[t],Math.max(mins[t],cfg[t]+d));
    refreshInputs();
    if(t==='count') buildDots();
    if(!started){ resetSession(); } // reflect new time live when idle
    render(); // keep summary line in sync even mid-session
  };
});

// toggles
$('soundToggle').onclick = function(){ cfg.sound=!cfg.sound; this.classList.toggle('on',cfg.sound); };
$('vibToggle').onclick   = function(){ cfg.vib=!cfg.vib; this.classList.toggle('on',cfg.vib);
  if(cfg.vib && navigator.vibrate) navigator.vibrate(40); };

// ---- install prompt ----
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  $('installRow').classList.add('show');
});
$('installBtn').onclick = async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  $('installRow').classList.remove('show');
};

// ---- keyboard (desktop convenience) ----
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){ e.preventDefault(); toggle(); }
  if(e.code==='ArrowRight'){ skip(); }
});

// ---- boot ----
load();
remaining=cfg.solve;
refreshInputs();
buildDots();
$('soundToggle').classList.toggle('on',cfg.sound);
$('vibToggle').classList.toggle('on',cfg.vib);
render();

// ---- service worker ----
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
